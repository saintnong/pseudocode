name: Build and Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install clang-format
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y clang-format

    - name: Configure CMake
      # Make binary universal in macOS
      run: |
        if [ "${{ runner.os }}" = "macOS" ]; then
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
        else
          cmake -B build -DCMAKE_BUILD_TYPE=Release
        fi
      shell: bash

    - name: Format Check
      if: runner.os == 'Linux'
      run: cmake --build build --target format-check

    - name: Build Project
      run: cmake --build build --config Release

    # Sign the binary on mac
    - name: Code Sign (macOS only)
      if: runner.os == 'macOS'
      run: codesign -s - build/scsa

    - name: Run Integration Tests
      run: ctest --test-dir build -C Release --output-on-failure

    - name: Run Benchmarks
      if: runner.os == 'Linux'
      run: python3 benchmarks/run_benchmarks.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: scsa-${{ matrix.os }}
        path: |
          build/scsa
          build/Release/scsa.exe
        if-no-files-found: ignore
        retention-days: 5