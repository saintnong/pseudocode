name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Upload
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            original_path: build/scsa
            release_name: scsa-linux
          - os: windows-latest
            original_path: build/Release/scsa.exe
            release_name: scsa-windows.exe
          - os: macos-latest
            original_path: build/scsa
            release_name: scsa-macos-universal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        # Universal compile flag to cmake on macOS
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build Project
        run: cmake --build build --config Release

      - name: Code Sign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - ${{ matrix.original_path }}

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ matrix.original_path }} dist/${{ matrix.release_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
